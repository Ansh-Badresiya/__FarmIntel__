version: "3.9"

services:
  # ── PostgreSQL 14 ──────────────────────────────────────────────────────────
  db:
    image: postgres:14-alpine
    container_name: agrisubsidy_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agri_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agri_pass}
      POSTGRES_DB: ${POSTGRES_DB:-agrisubsidy_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agri_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin 4 ──────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: agrisubsidy_pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@agrisubsidy.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-pgadmin_pass}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data:
